            const currentChapters = scripts[selectedCharacter];
            if (!currentChapters) return '';
            const chapter = currentChapters[currentChapterIndex];
            return chapter.content || '';
        }

        function getCurrentTask() {
            const currentChapters = scripts[selectedCharacter];
            if (!currentChapters) return '';
            const chapter = currentChapters[currentChapterIndex];
            return chapter.task || '';
        }

        function isFinalChapter() {
            const currentChapters = scripts[selectedCharacter];
            if (!currentChapters) return false;
            const chapter = currentChapters[currentChapterIndex];
            return chapter.isFinal || false;
        }

        function getProgressPercent() {
            const currentChapters = scripts[selectedCharacter];
            return currentChapters ? ((currentChapterIndex + 1) / currentChapters.length) * 100 : 0;
        }

        function getTotalChapters() {
            const currentChapters = scripts[selectedCharacter];
            return currentChapters ? currentChapters.length : 0;
        }

        function render() {
            const splashPage = document.getElementById('splash-page');
            const charactersPage = document.getElementById('characters-page');
            const readerPage = document.getElementById('reader-page');
            
            splashPage.classList.add('hidden');
            charactersPage.classList.add('hidden');
            readerPage.classList.add('hidden');

            if (currentPage === 'splash') {
                splashPage.classList.remove('hidden');
            } else if (currentPage === 'characters') {
                charactersPage.classList.remove('hidden');
                
                const cards = document.querySelectorAll('.character-card');
                cards.forEach(card => {
                    const id = card.getAttribute('data-character-id');
                    if (selectedCharacter === id) {
                        card.classList.add('selected');
                    } else {
                        card.classList.remove('selected');
                    }
                });

                const startBtn = document.getElementById('start-btn');
                if (startBtn) {
                    startBtn.disabled = !selectedCharacter;
                }
            } else if (currentPage === 'reader') {
                readerPage.classList.remove('hidden');

                const headerTitle = document.getElementById('header-title');
                const chapterTitle = document.getElementById('chapter-title');
                const scriptBox = document.getElementById('script-box');
                const taskSection = document.getElementById('task-section');
                const taskContent = document.getElementById('task-content');
                const progressBar = document.getElementById('progress-bar');
                const progressText = document.getElementById('progress-text');
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');

                headerTitle.textContent = getCurrentCharacterName();
                chapterTitle.textContent = getCurrentChapterTitle();
                
                const isFinal = isFinalChapter();
                if (isFinal) {
                    scriptBox.innerHTML = `<div class="final-chapter">${getCurrentScript()}</div>`;
                } else {
                    scriptBox.textContent = getCurrentScript();
                }
                
                const task = getCurrentTask();
                if (task && !isFinal) {
                    taskSection.classList.remove('hidden');
                    taskContent.textContent = task;
                } else {
                    taskSection.classList.add('hidden');
                }
                
                progressBar.style.width = getProgressPercent() + '%';
                progressText.textContent = `绗?${currentChapterIndex + 1} 绔?/ 鍏?${getTotalChapters()} 绔燻;
                
                prevBtn.disabled = currentChapterIndex === 0;
                nextBtn.disabled = currentChapterIndex === getTotalChapters() - 1;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
